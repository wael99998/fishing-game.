<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fisher Airdrop Pro</title>
    <style>
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; color: white; overflow: hidden; }
        
        /* الخلفية الواقعية */
        #game-app {
            width: 100vw; height: 100vh;
            background: url('https://img.freepik.com/premium-photo/underwater-background-with-colorful-corals-fish_1048944-24586311.jpg') no-repeat center/cover;
            position: relative; display: flex; flex-direction: column;
        }

        /* شريط الرصيد والطاقة العلوي */
        .header { width: 100%; display: flex; justify-content: space-between; padding: 15px; box-sizing: border-box; z-index: 10; }
        .stat-box { background: rgba(0,0,0,0.6); padding: 8px 15px; border-radius: 20px; border: 1px solid #ffcc00; font-weight: bold; }

        /* منطقة الصيد (القرش والأسماك) */
        .fish-zone { flex-grow: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        .shark { width: 300px; position: absolute; bottom: 50px; }

        /* الفوتر السفلي (القائمة) */
        .footer { width: 100%; height: 70px; background: rgba(0,0,0,0.9); display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #ffcc00; }
        .nav-item { text-align: center; font-size: 12px; }
    </style>
</head>
<body>

<div id="game-app">
    <div class="header">
        <div class="stat-box">⚡ الطاقة: 100/100</div>
        <div class="stat-box">🪙 الرصيد: 4,000,020</div>
    </div>

    <div class="fish-zone">
        <img src="https://img.freepik.com/premium-photo/great-white-shark-swimming-deep-blue-ocean_100236-478.jpg" class="shark" style="border-radius: 20px;">
    </div>

    <div class="footer">
        <div class="nav-item">▶️<br>اللعب</div>
        <div class="nav-item">📜<br>المهام</div>
        <div class="nav-item">👥<br>الإحالة</div>
        <div class="nav-item">🚀<br>الأيردروب</div>
    </div>
</div>

</body>
</html>
