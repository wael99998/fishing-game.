<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fisher Game</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #game { width: 100vw; height: 100vh; background: linear-gradient(180deg, #001f3f 0%, #000 100%); display: flex; flex-direction: column; align-items: center; justify-content: space-between; }
        
        .header { width: 100%; display: flex; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        .stat { background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 15px; border: 1px solid #00f2fe; }
        
        .main-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .fisher-img { width: 200px; height: 200px; background: url('https://cdn-icons-png.flaticon.com/512/3069/3069176.png') center/contain no-repeat; }
        
        .footer { width: 100%; height: 80px; display: flex; justify-content: space-around; background: rgba(0,0,0,0.8); border-top: 1px solid #333; align-items: center; }
    </style>
</head>
<body>
    <div id="game">
        <div class="header">
            <div class="stat">🪙 الرصيد: 4,000,000</div>
            <div class="stat">⚡ الطاقة: 100/100</div>
        </div>
        <div class="main-content">
            <div class="fisher-img"></div>
            <h3>ابدأ الصيد الآن</h3>
        </div>
        <div class="footer">
            <div>اللعب</div><div>المهام</div><div>الإحالة</div><div>الأيردروب</div>
        </div>
    </div>
</body>
</html>
