<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Fisher Global</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #001a2e; font-family: sans-serif; color: white; }
        #game-bg { width: 100%; height: 100%; background: radial-gradient(circle, #0a2e3a 0%, #020111 100%); position: relative; display: flex; flex-direction: column; }
        
        /* Header */
        #header { display: flex; justify-content: space-between; padding: 15px; z-index: 10; }
        .stat { background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; border: 1px solid #00f2fe; font-size: 14px; }
        
        /* Fisherman */
        #fisherman { font-size: 80px; text-align: center; margin-top: 20px; }
        
        /* Sea & Game Area */
        #sea { flex-grow: 1; position: relative; cursor: pointer; }
        .fish { position: absolute; font-size: 40px; transition: all 1s ease; }
        
        /* Navigation Bar */
        #nav { height: 70px; background: #070e1a; display: flex; justify-content: space-around; align-items: center; border-top: 2px solid #333; z-index: 20; }
        .nav-item { text-align: center; font-size: 12px; color: #aaa; }
        .active { color: #00f2fe; }
    </style>
</head>
<body>

<div id="game-bg">
    <div id="header">
        <div class="stat">🪙 الرصيد: <span id="score">4,000,000</span></div>
        <div class="stat">⚡ الطاقة: 100/100</div>
    </div>

    <div id="fisherman">👨‍🌾</div>

    <div id="sea" onclick="catchFish()">
        <div class="fish" style="top:30%; left:20%;">🐟</div>
        <div class="fish" style="top:50%; left:70%;">🦈</div>
        <div class="fish" style="top:70%; left:40%;">🐡</div>
    </div>

    <div id="nav">
        <div class="nav-item active">▶️<br>اللعب</div>
        <div class="nav-item">📜<br>المهام</div>
        <div class="nav-item">👥<br>الإحالة</div>
        <div class="nav-item">🚀<br>الأيردروب</div>
    </div>
</div>

<script>
    let score = 4000000;
    function catchFish() {
        score += 10;
        document.getElementById('score').innerText = score.toLocaleString();
    }
</script>
</body>
</html>
