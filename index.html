<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Fisher Game</title>
    <style>
        body { margin: 0; background: #000428; color: white; font-family: sans-serif; overflow: hidden; }
        .game-container { width: 100vw; height: 100vh; background: linear-gradient(to bottom, #000428, #004e92); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .status-bar { width: 90%; display: flex; justify-content: space-between; padding: 15px; background: rgba(255,255,255,0.1); border-radius: 20px; margin-bottom: 20px; }
        .fisher { font-size: 80px; }
        .fish { font-size: 50px; cursor: pointer; transition: transform 0.2s; }
        .fish:active { transform: scale(1.2); }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="status-bar">
            <span>🪙 الرصيد: 4,000,010</span>
            <span>⚡ الطاقة: 100/100</span>
        </div>
        <div class="fisher">🎣</div>
        <div style="margin-top: 50px;">
            <span class="fish" onclick="alert('تم الصيد!')">🐟</span>
            <span class="fish" onclick="alert('تم الصيد!')">🦈</span>
            <span class="fish" onclick="alert('تم الصيد!')">🐡</span>
        </div>
    </div>
</body>
</html>
