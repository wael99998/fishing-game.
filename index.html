<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Fisher - Global Edition</title>
    <style>
        body { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        /* الخلفية البحرية الفخمة */
        .game-screen { 
            width: 100vw; height: 100vh; 
            background: url('https://img.freepik.com/premium-photo/underwater-background-with-coral-reef-fishes_930365-276.jpg') no-repeat center/cover;
            position: relative;
        }
        /* الشريط العلوي */
        .top-ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-between; padding: 15px; box-sizing: border-box; }
        .box { background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 20px; border: 1px solid #00d4ff; font-weight: bold; }
        
        /* الأسماك الواقعية */
        .fish-item { position: absolute; width: 120px; height: 120px; cursor: pointer; transition: 0.3s; }
        
        /* الفوتر السفلي */
        .bottom-ui { position: absolute; bottom: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.8); display: flex; justify-content: space-around; align-items: center; border-top: 2px solid #00d4ff; }
    </style>
</head>
<body>

<div class="game-screen">
    <div class="top-ui">
        <div class="box">🪙 الرصيد: 4,000,000</div>
        <div class="box">⚡ الطاقة: 100/100</div>
    </div>

    <img src="https://cdn-icons-png.flaticon.com/512/3069/3069176.png" class="fish-item" style="top:30%; left:10%;">
    <img src="https://cdn-icons-png.flaticon.com/512/2965/2965331.png" class="fish-item" style="top:50%; left:60%;">

    <div class="bottom-ui">
        <div>▶️ اللعب</div>
        <div>📜 المهام</div>
        <div>👥 الإحالة</div>
        <div>🚀 الأيردروب</div>
    </div>
</div>

</body>
</html>
