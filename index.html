<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصياد الخارق - Tap to Earn</title>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --success: #00ffcc;
            --danger: #ff0055;
            --gold: #ffd700;
        }
        body {
            margin: 0;
            padding: 0;
            background: #020111;
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            text-align: center;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        /* لوحة التحكم العلوية الاحترافية */
        #header {
            padding: 15px;
            background: rgba(4, 12, 32, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(0, 242, 254, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #score-board {
            font-size: 24px;
            font-weight: 900;
            color: var(--gold);
            text-shadow: 0 0 12px rgba(255,215,0,0.6);
        }
        #energy-board {
            font-size: 14px;
            font-weight: bold;
            color: var(--success);
            flex-direction: column;
            align-items: flex-start;
            gap: 4px;
        }
        #energy-bar-bg {
            width: 120px;
            height: 8px;
            background: #1a233d;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid rgba(0, 255, 204, 0.2);
        }
        #energy-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--success), var(--secondary));
            transition: width 0.2s ease;
        }
        /* بيئة البحر العميقة والمؤثرات */
        #sea {
            position: relative;
            width: 100%;
            flex-grow: 1;
            background: linear-gradient(to bottom, #09203f, #134e5e);
            overflow: hidden;
        }
        #sea::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 20%, rgba(0,242,254,0.15) 0%, transparent 70%);
            pointer-events: none;
        }
        /* تصميم الكائنات التفاعلية */
        .spawn-item {
            position: absolute;
            font-size: 55px;
            cursor: pointer;
            z-index: 5;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
            transition: transform 0.1s ease, top 2s linear, left 2s linear;
            animation: float-anim 3s ease-in-out infinite alternate;
        }
        @keyframes float-anim {
            0% { margin-top: 0px; }
            100% { margin-top: 8px; }
        }
        #hook {
            position: absolute;
            top: 0;
            left: 50%;
            font-size: 45px;
            transform: translateX(-50%);
            transition: top 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            z-index: 9;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        /* الأرقام الطائرة عند الصيد (+10) */
        .floating-text {
            position: absolute;
            font-weight: 900;
            font-size: 26px;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 100;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.8); opacity: 1; }
            100% { transform: translateY(-80px) scale(1.2); opacity: 0; }
        }
        /* التحكم السفلي */
        #footer {
            padding: 20px;
            background: rgba(4, 12, 32, 0.9);
            border-top: 2px solid var(--primary);
            display: flex;
            justify-content: space-around;
            z-index: 10;
        }
        .btn {
            border: none;
            color: white;
            padding: 12px 28px;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }
        .btn-shop {
            background: linear-gradient(135deg, #8a2be2, #4a00e0);
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.4);
        }
        .btn-save {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            box-shadow: 0 0 15px rgba(56, 239, 125, 0.4);
        }
        .btn:active { transform: scale(0.92); }
        
        /* شاشة المتجر والترقيات الاحترافية */
        #shop-modal {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 400px;
            background: rgba(7, 18, 44, 0.98);
            border: 2px solid var(--primary);
            border-radius: 25px;
            padding: 25px;
            z-index: 1000;
            box-shadow: 0 0 40px rgba(0, 242, 254, 0.4);
            backdrop-filter: blur(10px);
        }
        .shop-header {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--primary);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: right;
        }
        .shop-item-title { font-size: 14px; font-weight: bold; }
        .shop-item-desc { font-size: 11px; color: #a0aec0; margin-top: 3px; }
        .btn-buy {
            background: var(--primary);
            color: #020111;
            padding: 8px 14px;
            font-size: 12px;
            border-radius: 12px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="header">
        <div class="stat-card" id="score-board">
            <span>🪙</span> <span id="score">0</span>
        </div>
        <div class="stat-card" id="energy-board">
            <div style="display:flex; justify-content:space-between; width:100%;">
                <span>⚡ الطاقة</span>
                <span><span id="energy">100</span>/<span id="max-energy">100</span></span>
            </div>
            <div id="energy-bar-bg"><div id="energy-bar"></div></div>
        </div>
    </div>

    <div id="sea" onclick="dropHook(event)">
        <div id="hook">🪝</div>
    </div>

    <div id="footer">
        <button class="btn btn-shop" onclick="toggleShop(true)">🛒 المتجر والترقيات</button>
        <button class="btn btn-save" onclick="saveData()">💰 ترحيل الأرباح للبوت</button>
    </div>
</div>

<div id="shop-modal">
    <div class="shop-header">🚀 مركز ترقيات الصياد المحترف</div>
    <div class="shop-item">
        <div>
            <div class="shop-item-title">🎣 تطوير شبكة الصيد</div>
            <div class="shop-item-desc">تزيد الأرباح لكل نقرة بمقدار <span id="hook-buff">+10</span></div>
        </div>
        <button class="btn btn-buy" id="upgrade-hook" onclick="buyUpgrade('hook')">تطوير (<span id="hook-cost">100</span> 🪙)</button>
    </div>
    <div class="shop-item">
        <div>
            <div class="shop-item-title">🔋 ترقية مخزن الطاقة</div>
            <div class="shop-item-desc">تزيد السعة القصوى بمقدار +50 نقطة طاقة</div>
        </div>
        <button class="btn btn-buy" id="upgrade-energy" onclick="buyUpgrade('energy')">شراء (<span id="energy-cost">150</span> 🪙)</button>
    </div>
    <button class="btn" style="background: var(--danger); width: 100%; justify-content: center; margin-top: 15px; border-radius: 15px;" onclick="toggleShop(false)">العودة للرحلة ↩️</button>
</div>

<script>
    // متغيرات اللعبة الأساسية وقابليتها للتوسع التلقائي
    let score = 0;
    let energy = 100;
    let maxEnergy = 100;
    let clickMultiplier = 1;
    
    let hookLevel = 1;
    let energyLevel = 1;
    
    const sea = document.getElementById('sea');
    const hook = document.getElementById('hook');
    const scoreDisplay = document.getElementById('score');
    const energyDisplay = document.getElementById('energy');
    const maxEnergyDisplay = document.getElementById('max-energy');
    const energyBar = document.getElementById('energy-bar');
    const shopModal = document.getElementById('shop-modal');

    // مصفوفة الكائنات الذكية ونسب الحظ وتوزيع المكافآت
    const poolConfig = [
        { icon: '🐟', type: 'normal', weight: 0.55, reward: 10, color: '#00f2fe' },
        { icon: '🐠', type: 'rare', weight: 0.75, reward: 40, color: '#ffd700' },
        { icon: '🦈', type: 'legendary', weight: 0.85, reward: 120, color: '#ff0055' },
        { icon: '💣', type: 'bomb', weight: 1.00, reward: -30, color: '#ff3333' }
    ];

    function spawnItem() {
        const rand = Math.random();
        const config = poolConfig.find(item => rand <= item.weight);
        
        const el = document.createElement('div');
        el.className = 'spawn-item';
        el.innerText = config.icon;
        
        if(config.type === 'legendary') el.style.filter = 'drop-shadow(0 0 12px #ff0055) scale(1.2)';
        if(config.type === 'rare') el.style.filter = 'drop-shadow(0 0 8px #ffd700)';

        let posX = Math.random() * (window.innerWidth - 70);
        let posY = Math.random() * (sea.clientHeight - 70);
        el.style.left = posX + 'px';
        el.style.top = posY + 'px';

        // وظيفة التفاعل والاصطياد اللحظي
        el.addEventListener('click', (e) => {
            e.stopPropagation();
            
            if (config.type !== 'bomb' && energy < 5) {
                showFloatingText(e.clientX, e.clientY, '⚠️ لا توجد طاقة!', 'var(--danger)');
                return;
            }

            // خصم الطاقة وتحديث الواجهة
            if (config.type !== 'bomb') {
                energy -= 5;
                updateEnergyUI();
            }

            // معالجة واحتساب النقاط والمؤثرات الطائرة
            if (config.type === 'bomb') {
                score = Math.max(0, score + config.reward);
                showFloatingText(e.clientX, e.clientY, `${config.reward} 💥`, config.color);
                if(window.navigator.vibrate) window.navigator.vibrate([100, 50, 100]);
            } else {
                let currentReward = config.reward * clickMultiplier;
                score += currentReward;
                showFloatingText(e.clientX, e.clientY, `+${currentReward} 🪙`, config.color);
                if(window.navigator.vibrate) window.navigator.vibrate(30);
            }

            scoreDisplay.innerText = score;
            el.style.transform = 'scale(0)';
            setTimeout(() => {
                el.remove();
                spawnItem();
            }, 150);
        });

        sea.appendChild(el);

        // محرك الذكاء الحركي للأسماك لمنع النمطية الساكنة
        function autoMove() {
            if (!el.parentElement) return;
            const nextX = Math.random() * (window.innerWidth - 70);
            const nextY = Math.random() * (sea.clientHeight - 70);
            
            // قلب اتجاه وجه السمكة هندسياً بناءً على وجهة الحركة
            if (config.type !== 'bomb') {
                el.style.transform = nextX > posX ? 'scaleX(-1)' : 'scaleX(1)';
            }
            
            posX = nextX; posY = nextY;
            el.style.left = posX + 'px'; el.style.top = posY + 'px';
            setTimeout(autoMove, Math.random() * 1500 + 1500);
        }
        setTimeout(autoMove, 100);
    }

    // دالة إسقاط الصنارة الديناميكية والتفاعلية مع النقر
    function dropHook(event) {
        const rect = sea.getBoundingClientRect();
        hook.style.left = (event.clientX - rect.left) + 'px';
        hook.style.top = (event.clientY - rect.top) + 'px';
        setTimeout(() => { hook.style.top = '0px'; }, 250);
    }

    // دالة إنشاء وإطلاق النصوص الطائرة التفاعلية الفورية (+10 🪙)
    function showFloatingText(x, y, text, color) {
        const txt = document.createElement('div');
        txt.className = 'floating-text';
        txt.innerText = text;
        txt.style.left = (x - 20) + 'px';
        txt.style.top = (y - 40) + 'px';
        txt.style.color = color;
        document.body.appendChild(txt);
        setTimeout(() => txt.remove(), 800);
    }

    // تحديث الواجهة الرسومية للطاقة وشريط التقدم
    function updateEnergyUI() {
        energy = Math.max(0, Math.min(maxEnergy, energy));
        energyDisplay.innerText = energy;
        maxEnergyDisplay.innerText = maxEnergy;
        energyBar.style.width = (energy / maxEnergy * 100) + '%';
    }

    // تعبئة الطاقة التلقائية الذكية (تحديث مستمر يدفع للاستمرارية)
    setInterval(() => {
        if (energy < maxEnergy) {
            energy += 3;
            updateEnergyUI();
        }
    }, 2000);

    // التحكم بالنافذة المنبثقة للمتجر
    function toggleShop(show) { shopModal.style.display = show ? 'block' : 'none'; }

    // معالج المشتريات والترقيات الرياضية داخل المتجر
    function buyUpgrade(type) {
        if (type === 'hook') {
            let cost = hookLevel * 100;
            if (score >= cost) {
                score -= cost;
                clickMultiplier += 1;
                hookLevel++;
                document.getElementById('hook-cost').innerText = hookLevel * 100;
                document.getElementById('hook-buff').innerText = `+${10 * clickMultiplier}`;
                alert('🚀 تمت ترقية الشباك والإنتاجية بنجاح!');
            } else { alert('🪙 رصيدك الحالي لا يغطي تكاليف التطوير!'); }
        } else if (type === 'energy') {
            let cost = energyLevel * 150;
            if (score >= cost) {
                score -= cost;
                maxEnergy += 50;
                energy = maxEnergy;
                energyLevel++;
                document.getElementById('energy-cost').innerText = energyLevel * 150;
                alert('🔋 تم توسيع خزان الطاقة الكلي!');
            } else { alert('🪙 رصيدك الحالي لا يغطي تكاليف التطوير!'); }
        }
        scoreDisplay.innerText = score;
        updateEnergyUI();
        toggleShop(false);
    }

    // توثيق وحفظ الأرباح وإرسالها لبوت تليجرام
    function saveData() {
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.sendData(JSON.stringify({ score: score }));
        } else {
            alert(`🔥 تم التوثيق بنجاح! رصيدك المجمع هو: ${score} نقطة 🪙`);
        }
    }

    // إطلاق الكائنات الحية التلقائية في البداية لملء البيئة البحرية
    for (let i = 0; i < 6; i++) spawnItem();

    // تهيئة ميزات واجهة تليجرام المصغرة وتوسيعها بالكامل
    if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
    }
</script>
</body>
</html>
