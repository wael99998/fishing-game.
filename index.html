<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Crypto Fisher Pro</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #game-bg { width: 100vw; height: 100vh; background: linear-gradient(to bottom, #051329, #0a2e3a); position: relative; }
        /* الصور الحقيقية */
        .fish-img { position: absolute; width: 80px; height: 80px; transition: all 2s linear; cursor: pointer; }
        /* الهيدر */
        .ui-top { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-between; padding: 10px; box-sizing: border-box; }
        .box { background: rgba(0,0,0,0.6); padding: 10px; border-radius: 15px; border: 1px solid #00f2fe; }
    </style>
</head>
<body>

<div id="game-bg">
    <div class="ui-top">
        <div class="box">🪙 الرصيد: <span id="score">4,000,230</span></div>
        <div class="box">⚡ الطاقة: 100/100</div>
    </div>
    
    <img src="https://cdn-icons-png.flaticon.com/512/3069/3069176.png" class="fish-img" id="f1" style="top:20%; left:10%;">
    <img src="https://cdn-icons-png.flaticon.com/512/2965/2965331.png" class="fish-img" id="f2" style="top:50%; left:60%;">
    <img src="https://cdn-icons-png.flaticon.com/512/4725/4725911.png" class="fish-img" id="f3" style="top:70%; left:30%;">
</div>

<script>
    // جعل الأسماك تتحرك بشكل عشوائي
    setInterval(() => {
        document.querySelectorAll('.fish-img').forEach(f => {
            f.style.top = Math.random() * 80 + '%';
            f.style.left = Math.random() * 80 + '%';
        });
    }, 2000);
</script>
</body>
</html>
